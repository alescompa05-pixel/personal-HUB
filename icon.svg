<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007aff" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  <!-- Background Card style Apple -->
  <rect width="512" height="512" rx="112" fill="url(#blueGrad)" />
  <!-- Glass Center Symbol -->
  <g filter="url(#shadow)" transform="translate(128, 128)">
    <rect x="20" y="20" width="216" height="216" rx="48" fill="rgba(255, 255, 255, 0.18)" stroke="rgba(255, 255, 255, 0.35)" stroke-width="4" style="backdrop-filter: blur(20px);" />
    <!-- Hub Concentric Circles Symbol -->
    <circle cx="128" cy="128" r="44" fill="#ffffff" />
    <circle cx="72" cy="128" r="14" fill="rgba(255, 255, 255, 0.75)" />
    <circle cx="184" cy="128" r="14" fill="rgba(255, 255, 255, 0.75)" />
    <circle cx="128" cy="72" r="14" fill="rgba(255, 255, 255, 0.75)" />
    <circle cx="128" cy="184" r="14" fill="rgba(255, 255, 255, 0.75)" />
  </g>
</svg>
